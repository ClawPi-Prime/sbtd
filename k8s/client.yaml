apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbtd-client
  namespace: sbtd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sbtd-client
  template:
    metadata:
      labels:
        app: sbtd-client
    spec:
      containers:
        - name: sbtd-client
          image: sbtd-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sbtd-client
  namespace: sbtd
spec:
  selector:
    app: sbtd-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
  type: NodePort
