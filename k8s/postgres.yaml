apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbtd-postgres
  namespace: sbtd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sbtd-postgres
  template:
    metadata:
      labels:
        app: sbtd-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: sbtd
            - name: POSTGRES_USER
              value: sbtd
            - name: POSTGRES_PASSWORD
              value: sbtd_dev_password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sbtd-postgres
  namespace: sbtd
spec:
  selector:
    app: sbtd-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
